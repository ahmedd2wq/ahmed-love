<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ahmet ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
color:white;
text-align:center;
}

.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:40px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
max-width:600px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
font-size:18px;
}

button{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff4b6e;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:fixed;
top:-10px;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<div class="container">

<h1>Ahmet ❤️</h1>

<p>
Seninle tanıştığım günden beri hayatım daha güzel.
Bu site küçük ama içindeki duygu büyük.
</p>

<button onclick="surprise()">Sürpriz</button>

<p id="mesaj"></p>

</div>

<script>

function surprise(){
document.getElementById("mesaj").innerHTML="Sen hayatımda olduğun için çok şanslıyım ❤️";
}

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},5000);
},300);

</script>

</body>
</html>
